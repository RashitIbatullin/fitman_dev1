name: fitman_app
description: Фитнес-менеджер App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fitman_common:
    path: ../packages/fitman_common
  http: ^1.5.0
  shared_preferences: ^2.0.15
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  intl: ^0.20.2
  fl_chart: ^1.2.0
  flutter_localizations:
    sdk: flutter
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  flutter_dotenv: ^6.0.1
  web_socket_channel: ^3.0.3
  http_parser: ^4.1.2
  file_picker: ^11.0.2
  url_launcher: ^6.1.0
  riverpod_annotation: ^2.6.1
  equatable: ^2.0.8
  collection: ^1.19.1
  dio: ^5.5.0+1
  carousel_slider: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.2
  build_runner: ^2.15.0
  freezed: ^2.5.2
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - .env.dev
    - .env.prod
    - .env.test
    - .env.dev.mobile
